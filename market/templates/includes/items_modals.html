
<style>
	.modal-content{
		background-color: #949184;
	}
</style>

<div class="modal fade" id="Modal-MoreInfo-{{item.id}}"
	 tabindex="-1"
	 aria-labelledby="exampleModalLabel" aria-hidden="true">
	 <div class="modal-dialog">
	 	<div class="modal-content">
	 		<div class="modal-header">
	 			<h5 style="color:black;" class="modal-title" id="ModalLabel">
	 				{{item.name}}	
	 			</h5>
	 			<button type="button" class="close"
	 					data-dismiss="modal" aria-label="close">
	 				<span aria-hiden="true">x</span>
	 			</button>
	 		</div>
	 		<div class="modal-body">
	 			<h5 style="color:black;"> {{item.description}} </h5>
	 			 
	 		</div>
	 		<div class="modal-footer">
	 			<button type="button" class="btn btn-secondary"
	 					data-dismiss="modal">Close
	 				
	 			</button>
	 		</div>
	 	</div> 	
	 </div>	
</div>

<!--Purchase ModaL -->
<div class="modal fade" id="Modal-PurchaseConfirm-{{item.id}}"
	 tabindex="-1"
	 aria-labelledby="exampleModalLabel" aria-hidden="true">
	 <div class="modal-dialog">
	 	<div class="modal-content">
	 		<div class="modal-header">
	 			<h5 style="color:black" class="modal-title" id="ModalLabel">
	 				{{item.name}}	
	 			</h5>
	 			<button type="button" class="close"
	 					data-dismiss="modal" aria-label="close">
	 				<span aria-hiden="true">x</span>
	 			</button>
	 		</div>
	 		<div class="modal-body">
	 			<form method="POST">
	 				{{ purchase_form.hidden_tag() }}

	 				<h4 class="text-center" style="color: black;">
	 					buy: {{item.name}} for price {{item.price}} NOK?
	 				</h4>
	 				<br>
	 				<input id="purchased_item" name="purchased_item" type="hidden" value="{{item.id}}">
	 				<h5 style="color:black;">
	 					{{ purchase_form.submit(class="btn btn-outline-dark btn-block")}}
	 				</h5>
	 			</form>
	 		</div>
	 		<div class="modal-footer">
	 			<button type="button" class="btn btn-secondary"
	 					data-dismiss="modal">Close
	 				
	 			</button>
	 		</div>
	 	</div> 	
	 </div>	
</div>
